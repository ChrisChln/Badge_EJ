<!-- Module 1: Data Manager -->
<script>
function escapeHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function mirrorPageEmployees(employees, columns = 2) {
  if (!Array.isArray(employees) || columns <= 1) {
    return Array.isArray(employees) ? [...employees] : [];
  }

  const mirrored = [];
  for (let index = 0; index < employees.length; index += columns) {
    const row = employees.slice(index, index + columns);
    mirrored.push(...row.reverse());
  }
  return mirrored;
}

const dataManager = (() => {
  let employeeData = [];

  return {
    getData() {
      return employeeData;
    },
    setData(data) {
      if (Array.isArray(data)) {
        employeeData = data.map((item, index) => ({
          ...item,
          _index: index
        }));
      }
    },
    getEmployee(index) {
      return employeeData[index] || null;
    },
    updateEmployee(index, updates) {
      if (!employeeData[index]) return false;
      employeeData[index] = {
        ...employeeData[index],
        ...updates,
        _index: index
      };
      return true;
    },
    getFilteredData(searchTerm) {
      if (!searchTerm) return employeeData;
      const term = searchTerm.toLowerCase();
      return employeeData.filter(emp => 
        Object.values(emp).some(val => 
          val && val.toString().toLowerCase().includes(term)
        )
      );
    },
    getCount() {
      return employeeData.length;
    },
    clear() {
      employeeData = [];
    }
  };
})();
</script>

<!-- Module 2: Excel Parser -->
<script>
const excelParser = (() => {
  return {
    async parseFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            
            // Convert to JSON with headers in first row
            const jsonData = XLSX.utils.sheet_to_json(worksheet);
            const headers = Object.keys(jsonData[0] || {});
            
            resolve({
              success: true,
              data: jsonData,
              headers: headers,
              rowCount: jsonData.length
            });
          } catch (error) {
            reject({
              success: false,
              error: error.message
            });
          }
        };
        
        reader.onerror = () => {
          reject({
            success: false,
            error: 'Failed to read file'
          });
        };
        
        reader.readAsArrayBuffer(file);
      });
    }
  };
})();
</script>

<!-- Module 3: Field Mapper -->
<script>
const fieldMapper = (() => {
  // Field name patterns for fuzzy matching
  const fieldPatterns = {
    name: ['name', '名字', 'full_name', 'fullname', 'employee_name', 'employeename', '姓名'],
    employeeId: ['id', 'employee_id', 'employeeid', 'emp_id', 'empid', '工号', 'number'],
    position: ['position', 'job_title', 'jobtitle', 'title', '职位', 'role'],
    agency: ['agency', 'department', 'dept', 'division', '部门', 'team'],
    account: ['account', 'username', 'user_name', 'login', '账户', '账号'],
    password: ['password', 'pwd', 'pass', '密码']
  };

  function fuzzyMatch(headerName, patterns) {
    const normalized = headerName.toLowerCase().trim();
    for (const pattern of patterns) {
      if (normalized.includes(pattern.toLowerCase()) || pattern.toLowerCase().includes(normalized)) {
        return true;
      }
    }
    return false;
  }

  return {
    mapFields(headers) {
      const mapping = {};
      const suggestions = {};

      // Try to auto-detect each field
      for (const [fieldName, patterns] of Object.entries(fieldPatterns)) {
        for (const header of headers) {
          if (fuzzyMatch(header, patterns)) {
            mapping[fieldName] = header;
            suggestions[fieldName] = header;
            break;
          }
        }
      }

      return {
        mapping,
        suggestions,
        unmappedFields: Object.keys(fieldPatterns).filter(f => !mapping[f]),
        unmappedColumns: headers.filter(h => !Object.values(mapping).includes(h))
      };
    },

    applyMapping(rawData, mapping) {
      return rawData.map(row => {
        const standardized = {};
        for (const [fieldName, columnName] of Object.entries(mapping)) {
          standardized[fieldName] = row[columnName] || '';
        }
        return standardized;
      });
    }
  };
})();
</script>

<!-- Module 4: Template Configuration -->
<script>
const templateConfig = (() => {
  let template = {
    pageSize: 'letter', // 'letter' or 'a4'
    orientation: 'portrait',
    cardsPerPage: 8,
    cardWidthMm: 85.6,
    cardHeightMm: 54,
    showQRCode: true,
    showBarcode: false,
    marginsMm: 10,
    bleedArea: true,
    theme: {
      primaryColor: '#27aae1',
      textColor: '#1f3550'
    },
    copy: {
      headerTitle: 'JD Outbound',
      headerSubtitle: 'Employee Work Card',
      headerBrand: 'JD Logistics',
      agencyLabel: 'Agency',
      positionLabel: 'Position',
      employeeIdLabel: 'Emp ID'
    },
    fields: {
      name: { x: 10, y: 12, fontSize: 16, weight: 'bold' },
      employeeId: { x: 10, y: 22, fontSize: 12 },
      position: { x: 10, y: 32, fontSize: 11 },
      agency: { x: 10, y: 40, fontSize: 10 }
    }
  };

  return {
    getTemplate() {
      return JSON.parse(JSON.stringify(template));
    },
    
    updateTemplate(updates) {
      const nextTemplate = { ...template, ...updates };
      nextTemplate.cardsPerPage = Math.max(2, Math.min(12, Number(nextTemplate.cardsPerPage) || 8));
      nextTemplate.marginsMm = Math.max(0, Math.min(20, Number(nextTemplate.marginsMm) || 10));
      nextTemplate.orientation = 'portrait';
      const incomingTheme = updates?.theme || {};
      const incomingCopy = updates?.copy || {};
      nextTemplate.theme = {
        primaryColor: incomingTheme.primaryColor || template.theme?.primaryColor || '#27aae1',
        textColor: incomingTheme.textColor || template.theme?.textColor || '#1f3550'
      };
      nextTemplate.copy = {
        headerTitle: incomingCopy.headerTitle || template.copy?.headerTitle || 'JD Outbound',
        headerSubtitle: incomingCopy.headerSubtitle || template.copy?.headerSubtitle || 'Employee Work Card',
        headerBrand: incomingCopy.headerBrand || template.copy?.headerBrand || 'JD Logistics',
        agencyLabel: incomingCopy.agencyLabel || template.copy?.agencyLabel || 'Agency',
        positionLabel: incomingCopy.positionLabel || template.copy?.positionLabel || 'Position',
        employeeIdLabel: incomingCopy.employeeIdLabel || template.copy?.employeeIdLabel || 'Emp ID'
      };
      template = nextTemplate;
    },
    
    resetTemplate() {
      template = {
        pageSize: 'letter',
        orientation: 'portrait',
        cardsPerPage: 8,
        cardWidthMm: 85.6,
        cardHeightMm: 54,
        showQRCode: true,
        showBarcode: false,
        marginsMm: 10,
        bleedArea: true,
        theme: {
          primaryColor: '#27aae1',
          textColor: '#1f3550'
        },
        copy: {
          headerTitle: 'JD Outbound',
          headerSubtitle: 'Employee Work Card',
          headerBrand: 'JD Logistics',
          agencyLabel: 'Agency',
          positionLabel: 'Position',
          employeeIdLabel: 'Emp ID'
        },
        fields: {
          name: { x: 10, y: 12, fontSize: 16, weight: 'bold' },
          employeeId: { x: 10, y: 22, fontSize: 12 },
          position: { x: 10, y: 32, fontSize: 11 },
          agency: { x: 10, y: 40, fontSize: 10 }
        }
      };
    },

    getPageDimensions() {
      if (template.pageSize === 'a4') {
        return { widthMm: 210, heightMm: 297 };
      }
      return { widthMm: 215.9, heightMm: 279.4 }; // US Letter
    }
  };
})();
</script>

<!-- Module 5: Storage Manager -->
<script>
const storageManager = (() => {
  const PREFIX = 'badge_tool_';
  
  return {
    save(key, data) {
      try {
        localStorage.setItem(PREFIX + key, JSON.stringify(data));
        return true;
      } catch (e) {
        console.error('Storage error:', e);
        return false;
      }
    },
    
    load(key) {
      try {
        const data = localStorage.getItem(PREFIX + key);
        return data ? JSON.parse(data) : null;
      } catch (e) {
        console.error('Storage error:', e);
        return null;
      }
    },
    
    clear(key) {
      try {
        localStorage.removeItem(PREFIX + key);
        return true;
      } catch (e) {
        console.error('Storage error:', e);
        return false;
      }
    },

    clearAll() {
      try {
        const keys = Object.keys(localStorage);
        keys.forEach(k => {
          if (k.startsWith(PREFIX)) localStorage.removeItem(k);
        });
        return true;
      } catch (e) {
        console.error('Storage error:', e);
        return false;
      }
    }
  };
})();
</script>

<!-- Module 7: QR Code Generator -->
<script>
const qrcodeGenerator = (() => {
  return {
    generateQRCodeDataUrl(text, size = 200) {
      return new Promise((resolve, reject) => {
        try {
          const container = document.createElement('div');
          container.style.width = size + 'px';
          container.style.height = size + 'px';
          
          // Create QR code using qrcode.js library
          const qr = new QRCode(container, {
            text: text,
            width: size,
            height: size,
            colorDark: '#000000',
            colorLight: '#FFFFFF',
            correctLevel: QRCode.CorrectLevel.H
          });

          // Get the canvas from the generated element
          setTimeout(() => {
            const canvas = container.querySelector('canvas');
            if (canvas) {
              const dataUrl = canvas.toDataURL('image/png');
              resolve(dataUrl);
            } else {
              reject('Failed to generate QR code');
            }
          }, 100);
        } catch (error) {
          reject(error);
        }
      });
    }
  };
})();
</script>

<!-- Module 9: Batch Paginator -->
<script>
const batchPaginator = (() => {
  return {
    paginateBadges(employeeData, cardsPerPage, pageSize = 'letter') {
      if (!Array.isArray(employeeData) || employeeData.length === 0) {
        return [];
      }

      const pages = [];
      const pageCount = Math.ceil(employeeData.length / cardsPerPage);

      for (let i = 0; i < pageCount; i++) {
        const start = i * cardsPerPage;
        const end = Math.min(start + cardsPerPage, employeeData.length);
        const pageEmployees = employeeData.slice(start, end);

        // Fill remaining slots with empty objects
        while (pageEmployees.length < cardsPerPage) {
          pageEmployees.push({ isEmpty: true });
        }

        pages.push({
          pageNumber: i + 1,
          employees: pageEmployees,
          pageSize: pageSize,
          cardsPerPage: cardsPerPage
        });
      }

      return pages;
    }
  };
})();
</script>

<!-- Module 10: Print Page Builder -->
<script>
const printPageBuilder = (() => {
  return {
    async buildPrintDocument(pages, templateConfig) {
      const template = templateConfig.getTemplate();
      const basePageWidthIn = template.pageSize === 'a4' ? 8.27 : 8.5;
      const basePageHeightIn = template.pageSize === 'a4' ? 11.69 : 11;
      const isLandscape = template.orientation === 'landscape';
      const pageWidthIn = isLandscape ? basePageHeightIn : basePageWidthIn;
      const pageHeightIn = isLandscape ? basePageWidthIn : basePageHeightIn;
      const gridCols = 2;
      const gridRows = Math.ceil(template.cardsPerPage / gridCols);

      let printHTML = `
        <html>
        <head>
          <meta charset="utf-8"/>
          <title>Badge Print</title>
          <style>
            * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
            }
            
            body {
              font-family: 'Inter', sans-serif;
              background: #f0f0f0;
            }

            .preview-toolbar {
              position: sticky;
              top: 0;
              z-index: 99;
              display: flex;
              justify-content: space-between;
              align-items: center;
              padding: 8px;
              background: #f0f0f0;
            }

            .print-hint {
              font-size: 12px;
              color: #475467;
            }

            .print-btn {
              border: 1px solid #c7d0d4;
              background: white;
              padding: 6px 10px;
              font-size: 12px;
              cursor: pointer;
            }

            @page {
              size: ${template.pageSize} ${template.orientation};
              margin: 0;
              padding: 0;
            }

            .print-page {
              page-break-after: always;
              width: ${pageWidthIn}in;
              height: ${pageHeightIn}in;
              display: grid;
              grid-template-columns: repeat(${gridCols}, ${template.cardWidthMm}mm);
              grid-template-rows: repeat(${gridRows}, ${template.cardHeightMm}mm);
              column-gap: 6mm;
              row-gap: 6mm;
              justify-content: center;
              align-content: start;
              padding: ${template.marginsMm}mm;
              background: white;
            }

            .print-page.back-page {
              direction: ltr;
            }

            .print-page:last-child {
              page-break-after: auto;
            }

            .badge-card {
              page-break-inside: avoid;
              break-inside: avoid;
              justify-self: center;
              align-self: start;
            }

            @media print {
              body { background: white; }
              .print-page { page-break-after: always; }
              .preview-toolbar { display: none; }
              @page { margin: 0; }
            }
          </style>
        </head>
        <body>
          <div class="preview-toolbar">
            <div class="print-hint">Print duplex with flip on long edge for front/back alignment.</div>
            <button class="print-btn" onclick="window.print()">Print</button>
          </div>
      `;

      for (const page of pages) {
        const frontEmployees = page.employees;
        const backEmployees = mirrorPageEmployees(page.employees, gridCols);

        printHTML += '<div class="print-page">';
        for (const emp of frontEmployees) {
          if (emp.isEmpty) {
            printHTML += '<div class="badge-card" style="background:#ffffff;"></div>';
            continue;
          }
          const badgeHTML = await badgeRenderer.renderBadge(emp, templateConfig, 'front');
          printHTML += badgeHTML;
        }
        printHTML += '</div>';

        printHTML += '<div class="print-page back-page">';
        for (const emp of backEmployees) {
          if (emp.isEmpty) {
            printHTML += '<div class="badge-card" style="background:#ffffff;"></div>';
            continue;
          }
          const badgeHTML = await badgeRenderer.renderBadge(emp, templateConfig, 'back');
          printHTML += badgeHTML;
        }
        printHTML += '</div>';
      }

      printHTML += `
        </body>
        </html>
      `;

      return printHTML;
    }
  };
})();
</script>

<!-- Module 11: Print Manager -->
<script>
const printManager = (() => {
  return {
    async openPrintPreviewMode(employeeData, templateConfig, options = {}) {
      try {
        const autoPrint = !!options.autoPrint;
        const template = templateConfig.getTemplate();
        const pages = batchPaginator.paginateBadges(employeeData, template.cardsPerPage, template.pageSize);

        if (pages.length === 0) {
          alert('No employees to print');
          return;
        }

        const printHTML = await printPageBuilder.buildPrintDocument(pages, templateConfig);

        // Open print-preview mode in a clean page (no controls)
        const printWindow = window.open('', 'PRINT', 'height=600,width=800');
        printWindow.document.write(printHTML);
        printWindow.document.close();
        if (autoPrint) {
          printWindow.focus();
          setTimeout(() => printWindow.print(), 250);
        }

      } catch (error) {
        console.error('Print error:', error);
        alert('Error generating print preview: ' + error.message);
      }
    },

    async generateAndPrint(employeeData, templateConfig) {
      await this.openPrintPreviewMode(employeeData, templateConfig, { autoPrint: true });
    }
  };
})();
</script>

<!-- Module 6: App Orchestrator & Event Handlers -->
<script>
const app = (() => {
  let currentMapping = null;
  let currentHeaders = null;
  let currentRawData = [];
  let selectedEmployeeIndex = null;
  let currentSearchTerm = '';
  const photoPool = [
    './img/1.png',
    './img/2.png',
    './img/3.png',
    './img/4.png',
    './img/5.png',
    './img/6.png'
  ];

  function getRandomPhoto() {
    return photoPool[Math.floor(Math.random() * photoPool.length)];
  }

  function getEmployeeStatus(emp) {
    return getEmployeeErrors(emp).length > 0 ? 'ERROR' : 'READY';
  }

  function getEmployeeErrors(emp) {
    const errors = [];
    if (!emp?.name) errors.push('Missing Name');
    if (!emp?.employeeId) errors.push('Missing Employee ID');
    return errors;
  }

  function annotateValidation(rows) {
    return rows.map(row => ({
      ...row,
      _photoUrl: row._photoUrl || getRandomPhoto(),
      _errors: getEmployeeErrors(row),
      _status: getEmployeeStatus(row)
    }));
  }

  function getMappedDataFromRaw(mapping) {
    const normalized = fieldMapper.applyMapping(currentRawData, mapping);
    return annotateValidation(normalized);
  }

  // Initialize app on page load
  function init() {
    setupEventListeners();
    loadStoredSettings();
    applyTemplateToControls();
    console.log('Badge Generator initialized');
  }

  function setupEventListeners() {
    // File upload
    const uploadArea = document.getElementById('upload-area');
    const fileInput = document.getElementById('file-input');
    const downloadTemplateBtn = document.getElementById('download-template');
    const searchInput = document.getElementById('search-input');
    const applyMappingBtn = document.getElementById('apply-mapping');
    const saveMappingPresetBtn = document.getElementById('save-mapping-preset');
    const loadMappingPresetBtn = document.getElementById('load-mapping-preset');
    const editCancelBtn = document.getElementById('edit-cancel');
    const editSaveBtn = document.getElementById('edit-save');
    const uploadStatus = document.getElementById('upload-status');

    if (uploadArea && fileInput) {
      uploadArea.addEventListener('click', () => fileInput.click());
      
      uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('bg-primary-container');
      });
      
      uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('bg-primary-container');
      });
      
      uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('bg-primary-container');
        if (e.dataTransfer.files.length > 0) {
          handleFileUpload(e.dataTransfer.files[0]);
        }
      });

      fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
          handleFileUpload(e.target.files[0]);
        }
      });
    }

    if (downloadTemplateBtn) {
      downloadTemplateBtn.addEventListener('click', downloadImportTemplate);
    }
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        currentSearchTerm = (e.target.value || '').trim();
        refreshEmployeeTable();
      });
    }
    if (applyMappingBtn) {
      applyMappingBtn.addEventListener('click', applyManualMapping);
    }
    if (saveMappingPresetBtn) {
      saveMappingPresetBtn.addEventListener('click', saveMappingPreset);
    }
    if (loadMappingPresetBtn) {
      loadMappingPresetBtn.addEventListener('click', loadMappingPresetIntoControls);
    }
    if (editCancelBtn) {
      editCancelBtn.addEventListener('click', closeEditModal);
    }
    if (editSaveBtn) {
      editSaveBtn.addEventListener('click', saveEditData);
    }

    setupTemplateListeners();

    // Nav button listeners
    setupNavButtons();
  }

  function downloadImportTemplate() {
    const uploadStatus = document.getElementById('upload-status');

    try {
      const headerRow = ['工号', '姓名', 'Agency', 'Position', '账号', '密码'];
      const sampleRow = ['10001', 'Chris', 'JDL', 'Picker', 'chris01', 'Temp@123'];
      const sheet = XLSX.utils.aoa_to_sheet([headerRow, sampleRow]);

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, sheet, 'ImportTemplate');
      XLSX.writeFile(workbook, 'badge_import_template.xlsx');

      if (uploadStatus) {
        uploadStatus.textContent = '✓ Template downloaded: badge_import_template.xlsx';
        uploadStatus.classList.remove('text-error');
        uploadStatus.classList.add('text-primary');
      }
    } catch (error) {
      console.error('Template download error:', error);
      if (uploadStatus) {
        uploadStatus.textContent = `✗ Template download failed: ${error.message || error}`;
        uploadStatus.classList.remove('text-primary');
        uploadStatus.classList.add('text-error');
      }
    }
  }

  async function handleFileUpload(file) {
    const uploadStatus = document.getElementById('upload-status');
    
    try {
      uploadStatus.textContent = 'Parsing...';
      uploadStatus.classList.add('text-primary');
      
      const result = await excelParser.parseFile(file);
      
      if (result.success) {
        currentHeaders = result.headers;
        currentRawData = result.data;
        
        // Auto-detect field mapping
        const mapResult = fieldMapper.mapFields(result.headers);
        const presetMapping = storageManager.load('mapping_preset_v1');
        const mergedMapping = presetMapping ? { ...mapResult.mapping, ...presetMapping } : mapResult.mapping;
        currentMapping = mergedMapping;
        
        // Apply mapping to data
        const standardizedData = annotateValidation(fieldMapper.applyMapping(result.data, mergedMapping));
        dataManager.setData(standardizedData);
        
        // Update UI
        uploadStatus.textContent = `✓ Loaded ${result.rowCount} employees`;
        uploadStatus.classList.remove('text-primary');
        uploadStatus.classList.add('text-primary');
        
        // Keep auto-mapping, but no manual mapping UI in simplified panel
        updateMappingDropdowns(result.headers, { ...mapResult, mapping: mergedMapping });
        
        // Update employee list
        refreshEmployeeTable();
        const first = dataManager.getData()[0];
        if (first) selectEmployee(first._index);
        updateNewEmployeeCount(result.rowCount);
        
        // Store mapping
        storageManager.save('mapping_v1', currentMapping);
        
      } else {
        throw new Error(result.error);
      }
    } catch (error) {
      uploadStatus.textContent = `✗ Error: ${error.message || error}`;
      uploadStatus.classList.add('text-error');
      console.error('Upload error:', error);
    }
  }

  function updateMappingDropdowns(headers, mapResult) {
    const mappingSection = document.getElementById('mapping-section');
    const fields = ['name', 'employeeId', 'position', 'agency', 'account', 'password'];
    if (mappingSection) mappingSection.classList.remove('hidden');

    fields.forEach((field) => {
      const select = document.getElementById(`map-${field}`);
      if (!select) return;
      const options = [''].concat(headers).map((header) => {
        const label = header || '-- Unmapped --';
        return `<option value="${header || ''}">${label}</option>`;
      }).join('');
      select.innerHTML = options;
      select.value = (mapResult.mapping[field] || '');
    });
    setMappingStatus('Mapping ready. You can apply or save as preset.');
  }

  function getMappingFromControls() {
    const fields = ['name', 'employeeId', 'position', 'agency', 'account', 'password'];
    const nextMapping = {};
    fields.forEach((field) => {
      const select = document.getElementById(`map-${field}`);
      const value = select?.value?.trim();
      if (value) nextMapping[field] = value;
    });
    return nextMapping;
  }

  function applyManualMapping() {
    if (!currentRawData.length || !currentHeaders) {
      alert('Please upload data first.');
      return;
    }
    currentMapping = getMappingFromControls();
    const standardizedData = getMappedDataFromRaw(currentMapping);
    dataManager.setData(standardizedData);
    storageManager.save('mapping_v1', currentMapping);
    updateNewEmployeeCount(standardizedData.length);
    refreshEmployeeTable();
    const first = dataManager.getData()[0];
    if (first) selectEmployee(first._index);
    setMappingStatus('Mapping applied.');
  }

  function setMappingStatus(message, isError = false) {
    const statusEl = document.getElementById('mapping-status');
    if (!statusEl) return;
    statusEl.textContent = message || '';
    statusEl.classList.toggle('text-error', isError);
    statusEl.classList.toggle('text-outline-variant', !isError);
  }

  function saveMappingPreset() {
    if (!currentHeaders || !currentHeaders.length) {
      setMappingStatus('No headers available. Upload data first.', true);
      return;
    }
    const preset = getMappingFromControls();
    if (Object.keys(preset).length === 0) {
      setMappingStatus('No mapped fields to save.', true);
      return;
    }
    storageManager.save('mapping_preset_v1', preset);
    setMappingStatus('Preset saved.');
  }

  function loadMappingPresetIntoControls() {
    const preset = storageManager.load('mapping_preset_v1');
    if (!preset) {
      setMappingStatus('No saved preset found.', true);
      return;
    }
    const fields = ['name', 'employeeId', 'position', 'agency', 'account', 'password'];
    fields.forEach((field) => {
      const select = document.getElementById(`map-${field}`);
      if (!select) return;
      const desired = preset[field] || '';
      const exists = Array.from(select.options).some(opt => opt.value === desired);
      if (exists) {
        select.value = desired;
      }
    });
    setMappingStatus('Preset loaded into mapping controls.');
  }

  function setupTemplateListeners() {
    const paperSizeEl = document.getElementById('paper-size');
    const paletteColorEl = document.getElementById('palette-color');
    const applyPaletteBtn = document.getElementById('apply-palette');
    const swatches = document.querySelectorAll('.palette-swatch');
    const applyCopyBtn = document.getElementById('apply-copy');
    const copyTitleEl = document.getElementById('copy-title');
    const copySubtitleEl = document.getElementById('copy-subtitle');
    const copyBrandEl = document.getElementById('copy-brand');
    const copyLabelAgencyEl = document.getElementById('copy-label-agency');
    const copyLabelPositionEl = document.getElementById('copy-label-position');
    const copyLabelEmpIdEl = document.getElementById('copy-label-empid');

    const updateTemplateFromControls = () => {
      const currentTemplate = templateConfig.getTemplate();
      templateConfig.updateTemplate({
        pageSize: paperSizeEl?.value || 'letter',
        orientation: 'portrait',
        cardsPerPage: 8,
        marginsMm: 10
      });

      storageManager.save('template_v1', templateConfig.getTemplate());
      updateBatchSummary();
    };

    [paperSizeEl].filter(Boolean).forEach((el) => {
      el.addEventListener('change', updateTemplateFromControls);
      el.addEventListener('input', updateTemplateFromControls);
    });

    if (applyPaletteBtn && paletteColorEl) {
      applyPaletteBtn.addEventListener('click', () => {
        const color = paletteColorEl.value || '#27aae1';
        templateConfig.updateTemplate({
          theme: {
            ...templateConfig.getTemplate().theme,
            primaryColor: color
          }
        });
        storageManager.save('template_v1', templateConfig.getTemplate());
        if (selectedEmployeeIndex !== null) selectEmployee(selectedEmployeeIndex);
        updateBatchSummary();
      });
    }
    swatches.forEach((btn) => {
      btn.addEventListener('click', () => {
        const color = btn.getAttribute('data-color') || '#27aae1';
        if (paletteColorEl) paletteColorEl.value = color;
        templateConfig.updateTemplate({
          theme: {
            ...templateConfig.getTemplate().theme,
            primaryColor: color
          }
        });
        storageManager.save('template_v1', templateConfig.getTemplate());
        if (selectedEmployeeIndex !== null) selectEmployee(selectedEmployeeIndex);
        updateBatchSummary();
      });
    });
    if (applyCopyBtn) {
      applyCopyBtn.addEventListener('click', () => {
        const current = templateConfig.getTemplate();
        templateConfig.updateTemplate({
          copy: {
            ...current.copy,
            headerTitle: copyTitleEl?.value?.trim() || current.copy?.headerTitle || 'JD Outbound',
            headerSubtitle: copySubtitleEl?.value?.trim() || current.copy?.headerSubtitle || 'Employee Work Card',
            headerBrand: copyBrandEl?.value?.trim() || current.copy?.headerBrand || 'JD Logistics',
            agencyLabel: copyLabelAgencyEl?.value?.trim() || current.copy?.agencyLabel || 'Agency',
            positionLabel: copyLabelPositionEl?.value?.trim() || current.copy?.positionLabel || 'Position',
            employeeIdLabel: copyLabelEmpIdEl?.value?.trim() || current.copy?.employeeIdLabel || 'Emp ID'
          }
        });
        storageManager.save('template_v1', templateConfig.getTemplate());
        if (selectedEmployeeIndex !== null) selectEmployee(selectedEmployeeIndex);
        updateBatchSummary();
      });
    }
  }

  function applyTemplateToControls() {
    const template = templateConfig.getTemplate();
    const paperSizeEl = document.getElementById('paper-size');
    const paletteColorEl = document.getElementById('palette-color');
    const copyTitleEl = document.getElementById('copy-title');
    const copySubtitleEl = document.getElementById('copy-subtitle');
    const copyBrandEl = document.getElementById('copy-brand');
    const copyLabelAgencyEl = document.getElementById('copy-label-agency');
    const copyLabelPositionEl = document.getElementById('copy-label-position');
    const copyLabelEmpIdEl = document.getElementById('copy-label-empid');

    if (paperSizeEl) paperSizeEl.value = template.pageSize;
    if (paletteColorEl) paletteColorEl.value = template.theme?.primaryColor || '#27aae1';
    if (copyTitleEl) copyTitleEl.value = template.copy?.headerTitle || 'JD Outbound';
    if (copySubtitleEl) copySubtitleEl.value = template.copy?.headerSubtitle || 'Employee Work Card';
    if (copyBrandEl) copyBrandEl.value = template.copy?.headerBrand || 'JD Logistics';
    if (copyLabelAgencyEl) copyLabelAgencyEl.value = template.copy?.agencyLabel || 'Agency';
    if (copyLabelPositionEl) copyLabelPositionEl.value = template.copy?.positionLabel || 'Position';
    if (copyLabelEmpIdEl) copyLabelEmpIdEl.value = template.copy?.employeeIdLabel || 'Emp ID';
    updateBatchSummary();
  }

  function updateNewEmployeeCount(count) {
    const countEl = document.getElementById('new-employee-count');
    if (countEl) {
      countEl.textContent = String(Number(count) || 0);
    }
  }

  function updateBatchSummary() {
    return;
  }

  function renderBatchPreview(pages) {
    return;
  }

  function refreshEmployeeTable() {
    const filtered = dataManager.getFilteredData(currentSearchTerm);
    updateEmployeeList(filtered);
  }

  function updateEmployeeList(listData = null) {
    const tbody = document.querySelector('tbody');
    const data = Array.isArray(listData) ? listData : dataManager.getData();
    
    if (!tbody) return;
    if (!data.length) {
      selectedEmployeeIndex = null;
      tbody.innerHTML = '<tr><td class="py-3 px-4 text-xs text-outline-variant" colspan="2">No employees found.</td></tr>';
      updateBadgePreview(null);
      updateBatchSummary();
      return;
    }

    tbody.innerHTML = data.map((emp, idx) => `
      <tr class="hover:bg-surface-container-highest cursor-pointer ${selectedEmployeeIndex === emp._index ? 'bg-primary/5' : ''}" data-index="${emp._index}">
        <td class="py-3 px-4">
          <p class="text-xs font-bold text-on-surface">${emp.name || 'N/A'}</p>
          <p class="text-[10px] text-outline font-mono">ID: ${emp.employeeId || 'N/A'}</p>
        </td>
        <td class="py-3 px-4">
          ${emp._status === 'ERROR'
            ? `<div class="flex flex-col gap-1">
                <span class="bg-error-container/20 text-error text-[9px] px-1.5 py-0.5 font-bold w-fit">ERROR</span>
                <span class="text-[9px] text-error">${(emp._errors || []).join(', ')}</span>
              </div>`
            : '<span class="bg-primary-container text-on-primary-container text-[9px] px-1.5 py-0.5 font-bold">READY</span>'
          }
        </td>
      </tr>
    `).join('');

    // Add click handlers for row selection
    tbody.querySelectorAll('tr[data-index]').forEach((row) => {
      const dataIndex = Number(row.getAttribute('data-index'));
      row.addEventListener('click', () => selectEmployee(dataIndex));
    });

    if (selectedEmployeeIndex === null && data[0]) {
      selectEmployee(data[0]._index);
    }
    updateBatchSummary();
  }

  function selectEmployee(index) {
    const emp = dataManager.getEmployee(index);
    if (!emp) return;
    selectedEmployeeIndex = index;

    // Update center preview
    updateBadgePreview(emp);
    
    // Update right panel details
    updateSelectedDetails(emp);
    
    // Highlight selected row
    document.querySelectorAll('tbody tr').forEach(row => {
      row.classList.remove('bg-primary/5');
    });
    document.querySelector(`tbody tr[data-index="${index}"]`)?.classList.add('bg-primary/5');
  }

  function renderPosterPreview() {
    const previewSection = document.querySelector('section.bg-surface-container-lowest.p-10');
    if (!previewSection) return;
    previewSection.innerHTML = `
      <div class="w-full max-w-5xl aspect-[3/2] bg-white overflow-hidden">
        <img src="./img/Home.jpg" alt="Homepage poster preview" class="w-full h-full object-contain bg-white"/>
      </div>
    `;
  }

  function updateBadgePreview(employee) {
    const previewSection = document.querySelector('section.bg-surface-container-lowest.p-10');
    if (!previewSection) return;
    if (!employee) {
      renderPosterPreview();
      return;
    }

    const template = templateConfig.getTemplate();
    Promise.all([
      badgeRenderer.renderBadge(employee, templateConfig, 'front'),
      badgeRenderer.renderBadge(employee, templateConfig, 'back')
    ]).then(([frontBadgeHTML, backBadgeHTML]) => {
      previewSection.innerHTML = `
        <div class="w-full max-w-6xl grid grid-cols-2 gap-10 items-start">
          <div class="flex flex-col items-center gap-3">
            ${frontBadgeHTML}
            <p class="text-[10px] font-semibold uppercase tracking-[0.16em] text-outline-variant">Front</p>
          </div>
          <div class="flex flex-col items-center gap-3">
            ${backBadgeHTML}
            <p class="text-[10px] font-semibold uppercase tracking-[0.16em] text-outline-variant">Back</p>
          </div>
        </div>
        <p id="badge-dimension-note" class="mt-8 text-[11px] text-outline italic">Badge dimensions: ${template.cardWidthMm.toFixed(2)} mm x ${template.cardHeightMm.toFixed(2)} mm</p>
      `;
    }).catch((err) => {
      console.error('Badge rendering error:', err);
      renderPosterPreview();
    });
  }

  function updateSelectedDetails(employee) {
    // Update right panel with selected employee details
    const detailsDiv = document.querySelector('.h-40.bg-surface-container-high');
    if (!detailsDiv) return;
    const photoUrl = employee._photoUrl || './img/1.png';

    detailsDiv.innerHTML = `
      <h3 class="text-[10px] font-bold text-outline-variant uppercase tracking-widest mb-3">Selected Details</h3>
      <div class="flex gap-4">
        <div class="w-16 h-16 bg-surface-container-lowest border border-outline-variant/20 flex-shrink-0 bg-contain bg-center bg-no-repeat" style="background-image:url('${photoUrl}')"></div>
        <div class="space-y-1">
          <p class="text-xs font-bold">${employee.name || 'N/A'}</p>
          <p class="text-[10px] text-on-surface-variant">ID: ${employee.employeeId || 'N/A'}</p>
          <p class="text-[10px] text-on-surface-variant">Position: ${employee.position || 'N/A'}</p>
          ${employee._status === 'ERROR'
            ? `<p class="text-[10px] text-error">Issue: ${(employee._errors || []).join(', ')}</p>`
            : ''
          }
          <button id="edit-selected-btn" class="mt-2 text-[10px] font-bold text-primary flex items-center gap-1">
            <span class="material-symbols-outlined text-xs" data-icon="edit">edit</span>
            EDIT DATA
          </button>
        </div>
      </div>
    `;
    const editBtn = document.getElementById('edit-selected-btn');
    if (editBtn) {
      editBtn.addEventListener('click', openEditModal);
    }
  }

  function openEditModal() {
    const emp = dataManager.getEmployee(selectedEmployeeIndex);
    if (!emp) return;
    const modal = document.getElementById('edit-modal');
    if (!modal) return;
    document.getElementById('edit-name').value = emp.name || '';
    document.getElementById('edit-employeeId').value = emp.employeeId || '';
    document.getElementById('edit-position').value = emp.position || '';
    document.getElementById('edit-agency').value = emp.agency || '';
    document.getElementById('edit-account').value = emp.account || '';
    document.getElementById('edit-password').value = emp.password || '';
    modal.classList.remove('hidden');
    modal.classList.add('flex');
  }

  function closeEditModal() {
    const modal = document.getElementById('edit-modal');
    if (!modal) return;
    modal.classList.add('hidden');
    modal.classList.remove('flex');
  }

  function saveEditData() {
    if (selectedEmployeeIndex === null) return;
    const updates = {
      name: document.getElementById('edit-name').value.trim(),
      employeeId: document.getElementById('edit-employeeId').value.trim(),
      position: document.getElementById('edit-position').value.trim(),
      agency: document.getElementById('edit-agency').value.trim(),
      account: document.getElementById('edit-account').value.trim(),
      password: document.getElementById('edit-password').value.trim()
    };
    updates._errors = getEmployeeErrors(updates);
    updates._status = getEmployeeStatus(updates);
    const ok = dataManager.updateEmployee(selectedEmployeeIndex, updates);
    if (!ok) {
      alert('Failed to update employee.');
      return;
    }
    closeEditModal();
    refreshEmployeeTable();
    selectEmployee(selectedEmployeeIndex);
  }

  function triggerBadgePrint() {
    const data = dataManager.getData();
    if (data.length === 0) {
      alert('No employees to print. Please load data first.');
      return;
    }
    const printable = data.filter(emp => emp._status !== 'ERROR');
    if (printable.length === 0) {
      alert('No valid employees to print. Please fix rows with missing Name or Employee ID.');
      return;
    }
    if (printable.length < data.length) {
      alert(`${data.length - printable.length} invalid rows were excluded from printing.`);
    }
    printManager.openPrintPreviewMode(printable, templateConfig);
  }

  function setupNavButtons() {
    const importExcelLink = document.getElementById('nav-import-excel');
    const printLink = document.getElementById('nav-print');
    const settingsLink = document.getElementById('nav-settings');

    if (importExcelLink) {
      importExcelLink.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('upload-area')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => document.getElementById('file-input')?.click(), 150);
      });
    }

    if (printLink) {
      printLink.addEventListener('click', (e) => {
        e.preventDefault();
        triggerBadgePrint();
      });
    }

    if (settingsLink) {
      settingsLink.addEventListener('click', (e) => {
        e.preventDefault();
        document.getElementById('paper-size')?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }

    document.addEventListener('keydown', (e) => {
      const isPrintShortcut = (e.metaKey || e.ctrlKey) && String(e.key).toLowerCase() === 'p';
      if (!isPrintShortcut) return;
      e.preventDefault();
      triggerBadgePrint();
    });
  }

  function loadStoredSettings() {
    // Load saved template and mapping
    const savedMapping = storageManager.load('mapping_v1');
    if (savedMapping) {
      currentMapping = savedMapping;
    }

    const savedTemplate = storageManager.load('template_v1');
    if (savedTemplate) {
      templateConfig.updateTemplate(savedTemplate);
    }

    applyTemplateToControls();
  }

  return {
    init
  };
})();

// Initialize app when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', app.init);
} else {
  app.init();
}
</script>
